            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMemberListResponse'
  /v2/farcaster/cast/search:
    get:
      tags: [v2]
      summary: Search casts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        '200':
          description: Cast search response
          content:
            application/json:
              schema:
