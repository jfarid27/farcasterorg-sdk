  /v1/fidAddressType:
    get:
      tags: [v1]
      summary: Get address type for FID
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address type response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FidAddressTypeResponse'
  /v1/events:
    get:
      tags: [v1]
      summary: Get hub events
      parameters:
        - name: from_event_id
          in: query
          schema:
            type: integer
        - name: shard_index
          in: query
          schema:
            type: integer
        - name: stop_id
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Hub events response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsResponse'
  /v1/eventById:
    get:
      tags: [v1]
      summary: Get hub event by ID
      parameters:
        - name: event_id
          in: query
          required: true
          schema:
            type: integer
        - name: shard_index
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Hub event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HubEvent'
  /v1/currentPeers:
    get:
      tags: [v1]
      summary: Get connected peers
      responses:
        '200':
          description: Connected peers response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConnectedPeersResponse'

  # V2 Endpoints (API Compatibility)
  /v2/farcaster/followers:
    get:
      tags: [v2]
      summary: Get followers of a user
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        '200':
          description: Followers response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowersResponse'
  /v2/farcaster/following:
    get:
      tags: [v2]
      summary: Get following of a user
      parameters:
