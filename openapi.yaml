      responses:
        '200':
          description: Paged user data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
  /v1/storageLimitsByFid:
    get:
      tags: [v1]
      summary: Get storage limits by FID
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Storage limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageLimitsResponse'
  /v1/userNameProofByName:
    get:
      tags: [v1]
      summary: Get username proof by name
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Username proof
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNameProof'
  /v1/userNameProofsByFid:
