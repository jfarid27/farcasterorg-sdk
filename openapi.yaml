components:
  schemas:
    # V1 Schemas
    InfoResponse:
      type: object
      properties:
        dbStats:
          $ref: '#/components/schemas/DbStats'
        numShards:
          type: integer
        shardInfos:
          type: array
          items:
            $ref: '#/components/schemas/ShardInfo'
        version:
          type: string
        peer_id:
          type: string
        nextEngineVersionTimestamp:
          type: integer

    DbStats:
      type: object
      properties:
        numMessages:
          type: integer
        numFidRegistrations:
          type: integer
        approxSize:
          type: integer

    ShardInfo:
      type: object
      properties:
        shardId:
          type: integer
        maxHeight:
          type: integer
        numMessages:
          type: integer
        numFidRegistrations:
          type: integer
        approxSize:
          type: integer
        blockDelay:
          type: integer
        mempoolSize:
          type: integer

    GetFidsResponse:
      type: object
      properties:
        fids:
          type: array
          items:
            type: integer
        nextPageToken:
          type: string

    Message:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MessageData'
        hash:
          type: string
        hashScheme:
          type: string
        signature:
          type: string
          description: Base64 encoded signature
        signatureScheme:
          type: string
        signer:
          type: string

    MessageData:
      type: object
      properties:
        type:
          type: string
        fid:
          type: integer
        timestamp:
          type: integer
        network:
          type: string
        castAddBody:
          $ref: '#/components/schemas/CastAddBody'
        castRemoveBody:
