      tags: [v2]
      summary: Get trending feed
      parameters:
        - name: time_window
          in: query
          schema:
            type: string
            default: 24h
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
