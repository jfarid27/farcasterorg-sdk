      responses:
        '200':
          description: FID response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FidResponse'
  /v1/addressesByName:
    get:
      tags: [v1]
      summary: Get addresses by name
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Name to addresses mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameToAddressResponse'
  /v1/fidByAddress:
    get:
      tags: [v1]
      summary: Get FID by address
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address to FID mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressToFidResponse'
  /v1/validateMessage:
    post:
      tags: [v1]
      summary: Validate a message (binary)
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
  /v1/submitMessage:
    post:
      tags: [v1]
      summary: Submit a message (binary)
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Submitted message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /v1/submitBulkMessages:
    post:
      tags: [v1]
      summary: Submit multiple messages (binary)
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Submit bulk response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitBulkMessagesResponse'
  /v1/verificationsByFid:
    get:
      tags: [v1]
      summary: Get verifications by FID
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paged verifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
  /v1/onChainSignersByFid:
    get:
      tags: [v1]
      summary: Get on-chain signers by FID
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: On-chain event response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnChainEventResponse'
  /v1/onChainEventsByFid:
    get:
      tags: [v1]
      summary: Get on-chain events by FID
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: event_type
          in: query
          required: true
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: On-chain event response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnChainEventResponse'
  /v1/onChainIdRegistryEventByAddress:
    get:
      tags: [v1]
      summary: Get ID registry event by address
      parameters:
        - name: address
          in: query
          required: true
          schema:
