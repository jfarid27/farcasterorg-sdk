openapi: 3.1.1
info:
  title: HyperSnap API
  description: |
    API for HyperSnap Farcaster Hub and compatible V2 endpoints.
    
    ### Sharding in HyperSnap
    HyperSnap utilizes a sharded architecture to scale data storage. The network is divided into multiple shards, and each Farcaster ID (FID) is assigned to a specific shard.
    
    **Shard Calculation Logic:**
    The shard ID for a given FID is computed as follows:
    1. Convert the FID to an 8-byte big-endian unsigned 64-bit integer.
    2. Compute the SHA-256 hash of these bytes.
    3. Take the first 4 bytes of the hash as a big-endian unsigned 32-bit integer.
    4. Apply the formula: `(hash_u32 % total_shards) + 1`.
    
    **Shard 0 (Global):**
    Shard 0 is reserved for global network events, such as storage lending.
    
    **Request Routing:**
    - `/v1/fids` **requires** an explicit `shard_id` parameter.
    - Most other Hub V1 endpoints (e.g., `/v1/castsByFid`) route internally based on the `fid` provided in the request. However, a node only responds successfully if it is configured to handle the shard associated with that FID.
    - If a node handles multiple shards, it routes the request to the appropriate internal store.
    - If a node does not handle the required shard, it may return a `400 Bad Request` with the error `no shard store for fid`.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: v1
    description: Hub V1 API endpoints (Hubble compatible)
  - name: v2
    description: Farcaster V2 API compatibility endpoints
paths:
  # V1 Endpoints
  /v1/info:
    get:
      tags: [v1]
      summary: Get hub info
      description: Retrieve general information about the Hub, including the total number of shards in the network and the specific shards this node handles.
      responses:
        '200':
          description: Hub info response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
  /v1/fids:
    get:
      tags: [v1]
      summary: Get registered FIDs
      description: Retrieve a paged list of all FIDs registered on a specific shard.
      parameters:
        - name: shard_id
          in: query
          required: true
          description: The ID of the shard to query (1 to total_shards).
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: FIDs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFidsResponse'
  /v1/castById:
    get:
      tags: [v1]
      summary: Get cast by FID and hash
      description: Retrieve a specific cast message. The node will route to the correct shard internally if it handles it.
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: hash
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cast message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /v1/castsByFid:
    get:
      tags: [v1]
      summary: Get casts by FID
      description: Retrieve a paged list of casts authored by a specific FID.
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: start_timestamp
          in: query
          schema:
            type: integer
        - name: stop_timestamp
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paged casts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
  /v1/castsByMention:
    get:
      tags: [v1]
      summary: Get casts by mention
      description: Retrieve a paged list of casts that mention a specific FID.
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paged casts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
  /v1/castsByParent:
    get:
      tags: [v1]
      summary: Get casts by parent
      description: Retrieve a paged list of casts that are replies to a specific parent.
      parameters:
        - name: fid
          in: query
          schema:
            type: integer
        - name: hash
          in: query
          schema:
            type: string
        - name: url
          in: query
          schema:
            type: string
        - name: page_size
          in: query
          schema:
            type: integer
        - name: page_token
          in: query
          schema:
            type: string
        - name: reverse
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paged casts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
  /v1/reactionById:
    get:
      tags: [v1]
      summary: Get reaction by ID
      parameters:
        - name: fid
          in: query
          required: true
          schema:
            type: integer
        - name: reaction_type
          in: query
          required: true
          schema:
            type: integer
        - name: target_fid
          in: query
          schema:
            type: integer
        - name: target_hash
          in: query
          schema:
            type: string
        - name: target_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Reaction message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /v1/reactionsByFid:
